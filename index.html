<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楊欣培 Stephanie Yang | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #a29bfe;
            --text-color: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.9rem;
            color: #636e72;
        }

        .contact-info a {
            color: #636e72;
            text-decoration: none;
        }

        .contact-info a:hover {
            color: #764ba2;
        }

        section {
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.5rem;
            color: #4834d4;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        h2::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.1);
        }

        .item {
            background: rgba(255,255,255,0.5);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid transparent;
        }

        .item:hover {
            border-color: var(--accent-color);
            background: white;
            transform: scale(1.02);
        }

        .item-title {
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            color: #2d3436;
        }

        .date {
            background: #dfe6e9;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #636e72;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .skill-tag {
            background: white;
            color: #6c5ce7;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .skill-tag:hover {
            background: #6c5ce7;
            color: white;
            transform: translateY(-5px);
        }

        ul { padding-left: 20px; margin-top: 10px; }
        li { margin-bottom: 5px; color: #636e72; }

        @media (max-width: 600px) {
            .container { padding: 25px; margin: 10px; }
            h1 { font-size: 1.8rem; }
            .item-title { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>楊欣培 Stephanie Yang</h1>
        <div class="contact-info">
            <a href="mailto:friendmail1993@gmail.com"><i class="fas fa-envelope"></i> Email</a> | 
            <a href="https://github.com/friendmail1993" target="_blank"><i class="fab fa-github"></i> GitHub</a> | 
            <span><i class="fas fa-map-marker-alt"></i> 台灣，台中</span>
        </div>
    </header>

    <section style="animation-delay: 0.2s;">
        <h2><i class="fas fa-user"></i> 關於我</h2>
        <p>我是一位熱愛技術的開發者，喜歡學習新事物並分享知識。目前專注於數據分析與 SQL 資料庫管理，享受從資料中挖掘價值的過程。</p>
    </section>

    <section style="animation-delay: 0.4s;">
        <h2><i class="fas fa-briefcase"></i> 工作經歷</h2>
        <div class="item">
            <div class="item-title">
                <span>某某科技公司 - 軟體工程師</span>
                <span class="date">2023 - 至今</span>
            </div>
            <ul>
                <li>負責前端開發與維護，提升頁面載入速度 20%。</li>
                <li>協作開發內部自動化工具。</li>
            </ul>
        </div>
    </section>

    <section style="animation-delay: 0.6s;">
        <h2><i class="fas fa-code"></i> 專業技能</h2>
        <div class="skills">
            <span class="skill-tag">Python / Pandas</span>
            <span class="skill-tag">SQL Server</span>
            <span class="skill-tag">Power BI</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Git / GitHub</span>
            <span class="skill-tag">React</span>
        </div>
    </section>

    <section style="animation-delay: 0.8s;">
        <h2><i class="fas fa-graduation-cap"></i> 教育背景</h2>
        <div class="item">
            <div class="item-title">
                <span>勤益科技大學 - 應用英語系</span>
                <span class="date">2012 - 2016</span>
            </div>
        </div>
    </section>
</div>

</body>
</html>
